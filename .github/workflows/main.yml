name: Pruebas Cypress
on:
  push:
    branches: 
      - main
  pull_request: 
    branches:
      - main

  workflow_dispatch: 

jobs:
  cypress-run:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '22'

      - name: Remove node_modules and package-lock.json
        run: |
          if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }
          if (Test-Path package-lock.json) { Remove-Item -Force package-lock.json }
        working-directory: ./sitio_pruebas

      - name: Install dependencies
        run: npm install
        working-directory: ./sitio_pruebas

      - name: Start the application (Windows Background)
        # Usamos PowerShell para levantar el servidor de desarrollo en un proceso independiente
        run: |
          Start-Process -FilePath "npm" -ArgumentList "run dev" -NoNewWindow
        working-directory: ./sitio_pruebas
        env:
          CI: true

      - name: Wait for the application to be ready
        # Corregido a 'wait-on' con guion
        run: npx wait-on http://localhost:5173
        working-directory: ./sitio_pruebas

      - name: Run Cypress tests
        run: npx cypress run
        working-directory: ./sitio_pruebas
